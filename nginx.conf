server {
  listen 80;
  server_name _;

  # Re-resolve Docker service names to avoid stale upstream IPs after container redeploys.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $backend_upstream taskrit-backend:3000;
  set $chat_upstream taskrit-chatting:3001;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  location /chat-api/ {
    rewrite ^/chat-api/?(.*)$ /$1 break;
    proxy_pass http://$chat_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  location /chat-ws/ {
    rewrite ^/chat-ws/?(.*)$ /ws/$1 break;
    proxy_pass http://$chat_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
