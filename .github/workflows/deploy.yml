name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskrit-frontend
  CONTAINER_NAME: taskrit-frontend
  CONTAINER_PORT: 80

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required build secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.VITE_API_BASE }}" ]; then
            echo "::error::Missing required secret: VITE_API_BASE"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_CHAT_API_BASE }}" ]; then
            echo "::error::Missing required secret: VITE_CHAT_API_BASE"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_CHAT_WS_BASE }}" ]; then
            echo "::error::Missing required secret: VITE_CHAT_WS_BASE"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            VITE_CHAT_API_BASE=${{ secrets.VITE_CHAT_API_BASE }}
            VITE_CHAT_WS_BASE=${{ secrets.VITE_CHAT_WS_BASE }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          timeout 15s ssh-keyscan -T 5 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_PAT }}"
            docker pull "${{ env.IMAGE_NAME }}:latest"

            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            # Ensure network exists
            docker network create "taskrit-network" || true

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --network "taskrit-network" \
              --restart unless-stopped \
              -p "${{ secrets.SERVER_PORT }}:${{ env.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:latest"
          EOF
